services:
  backend:
    image: python:3.11-slim
    container_name: roooty-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && 
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    container_name: roooty-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Evitar que los node_modules de Windows se sobreescriban en Linux y viceversa
      - node_modules_data:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  node_modules_data:
